#==============================================================================
# YOLO 训练配置
# 自动生成时间: 2026-07-06 15:53:32
# 编辑后保存; 重新生成(--overwrite)会覆盖并备份原文件.
#==============================================================================

#------------------------------------------------------------------------------
# 核心参数
#------------------------------------------------------------------------------

# 模型文件路径(.pt 或 .yaml)
# 示例: yolo11n.pt, yolo11s.pt, path/to/custom.pt
# 提示:
#   - 支持 .pt 权重文件或 .yaml 配置文件
#   - 官方模型: yolo11n/s/m/l/x.pt (n 最快, x 最准)
#   - 训练时如未指定, 默认从头训练
model: null

# 数据集配置文件(D3 odp-transform 产出的那份 yaml)
# 示例: data.yaml, rsod.yaml, configs/datasets/safety.yaml
# 提示:
#   - YAML 文件定义数据集路径和类别信息
#   - 必须包含: path, train, val, names
#   - 如果只给数据集名(如 'rsod'), 框架会通过 paths.dataset_yaml_path() 解析
data: null

# 任务类型(只能是 detect / segment)
# 示例: detect, segment
# 提示:
#   - 限定取值: detect / segment
#   - 决定模型加载方式 + 输出目录的一级子目录
#   - 想给实验起名? → 用 experiment_name 字段
task: detect

# 实验名(目录组织, 不影响语义; None=自动生成)
# 示例: baseline, helmet_v1, lr001_aug_strong, null
# 提示:
#   - None: 由 ultralytics 自动生成 exp / exp2 / exp3...
#   - 自定义: 用作 runs/<task>/<experiment_name>/ 子目录
#   - 推荐命名: <模型>_<数据集>_<关键调参>
experiment_name: null

#------------------------------------------------------------------------------
# 输入配置
#------------------------------------------------------------------------------

# 批次大小(int=固定值, -1=自动, 0-1=显存利用率)
# 示例: 8, 16, 32, -1, 0.7
# 提示:
#   - int: 固定批次大小(如 16)
#   - -1: 自动批次(使用约 60% 显存)
#   - 0.0-1.0: 显存利用率(如 0.7 = 70% 显存)
#   - 显存不足时建议: 8GB → 8-16, 16GB → 32-64
batch: 16

# 输入图像尺寸(像素)
# 示例: 320, 480, 640, 800, 1280
# 提示:
#   - 推荐使用 32 的倍数(640, 672, 704...)
#   - 更大尺寸 = 更高精度 + 更多显存 + 更慢速度
#   - 工业检测推荐: 640-800
#   - 小目标检测推荐: 1280+
imgsz: 640

# 数据加载线程数
# 示例: 0, 4, 8, 16
# 提示:
#   - 多线程加速数据加载
#   - 推荐: CPU 核心数的 1-2 倍
#   - Windows 可能需要设为 0
#   - 过高会导致内存占用过多
workers: 8

# 数据缓存(False/True/ram/disk)
# 示例: false, true, ram, disk
# 提示:
#   - False: 不缓存(默认)
#   - True/'ram': 缓存到内存(快但占内存)
#   - 'disk': 缓存到磁盘(节省内存但慢)
#   - 小数据集推荐 ram, 大数据集推荐 disk
cache: false

# 是否启用矩形训练
# 示例: false, true
# 提示:
#   - True: 减少填充, 提升训练速度
#   - 推理时自动启用
#   - 可能轻微影响精度
rect: false

#------------------------------------------------------------------------------
# 设备配置
#------------------------------------------------------------------------------

# 设备选择(0/cpu/mps/[0,1]/0,1)
# 示例: 0, 0, cpu, mps, [0, 1], 0,1
# 提示:
#   - None: 自动选择(优先 GPU)
#   - int: GPU 编号(0, 1, 2...)
#   - 'cpu': 使用 CPU
#   - 'mps': Mac M1/M2 GPU
#   - [0,1] 或 '0,1': 多 GPU 训练
#   - -1: 选择最空闲的 GPU
device: null

# 是否启用 AMP(推荐开启)
# 示例: true, false
# 提示:
#   - True: 使用 FP16 混合精度(快 + 省显存)
#   - False: 使用 FP32 全精度
#   - 现代 GPU (20 系+) 强烈推荐开启
#   - CPU 训练时自动禁用
amp: true

#------------------------------------------------------------------------------
# 输出配置
#------------------------------------------------------------------------------

# 项目输出目录(None=框架自动)
# 示例: runs/detect, experiments/safety
# 提示:
#   - 训练输出的根目录
#   - 默认: 由 service 层根据 task 自动拼装(runs/<task>/)
project: null

# 实验名称
# 示例: exp, safety_v1, baseline
# 提示:
#   - 每次运行的子目录名
#   - 默认: ultralytics 自动生成 exp, exp2, exp3...
name: null

# 是否覆盖已有实验目录
# 示例: false, true
# 提示:
#   - False: 自动创建新目录(exp2, exp3...)
#   - True: 覆盖已有目录
#   - 生产环境建议 False
exist_ok: false

# 是否保存检查点
# 示例: true, false
# 提示:
#   - True: 保存 last.pt 和 best.pt
#   - False: 不保存检查点(节省磁盘)
save: true

#------------------------------------------------------------------------------
# 基础设置
#------------------------------------------------------------------------------

# 是否显示详细日志
# 示例: true, false
# 提示:
#   - True: 显示详细日志
#   - False: 只显示关键信息
verbose: true

# 随机种子(可复现性)
# 示例: 0, 42, 2026
# 提示:
#   - 控制随机性, 确保可复现
#   - 相同种子 = 相同结果
#   - 建议每个实验使用不同种子
seed: 0

# 是否强制确定性算法
# 示例: true, false
# 提示:
#   - True: 强制使用确定性算法(完全可复现)
#   - False: 允许非确定性算法(可能更快)
#   - 实验对比时必须设为 True
deterministic: true

#------------------------------------------------------------------------------
# 训练控制
#------------------------------------------------------------------------------

# 训练总轮数(epoch)
# 示例: 50, 100, 200, 300
# 提示:
#   - 小数据集: 50-100 轮
#   - 中等数据集: 100-200 轮
#   - 大数据集 / 工业检测: 200-300 轮
#   - 过拟合风险时可减少轮数
epochs: 100

# 最长训练时间(小时, None=不限制)
# 示例: 1.0, 2.5, 12.0, 24.0
# 提示:
#   - 限制最长训练时间(小时), 设置后可提前终止
#   - 适合有时间限制的场景
#   - None 表示不限制
time: null

# Early Stopping 耐心值(0=禁用)
# 示例: 50, 100, 150
# 提示:
#   - 多少轮无提升后停止训练
#   - 0 表示禁用 Early Stopping
#   - 建议设为 epochs 的 30-50%
patience: 100

# 是否从检查点恢复训练
# 示例: false, true
# 提示:
#   - True: 从最近的检查点恢复
#   - False: 从头开始训练
#   - 需要已有 last.pt 检查点
#   - 恢复时会保留优化器状态
resume: false

# 最后 N 轮关闭 mosaic(0=不关闭)
# 示例: 0, 10, 15
# 提示:
#   - 最后 N 轮关闭 mosaic 增强
#   - 有助于模型适应真实分布
#   - 0 表示不关闭
#   - 建议 10-15 轮
close_mosaic: 10

# 是否启用多尺度训练
# 示例: false, true
# 提示:
#   - True: 随机改变输入尺寸(±50%)
#   - 提升模型对不同尺度的鲁棒性
#   - 会略微增加训练时间
#   - 小目标检测时推荐开启
multi_scale: false

# 训练数据使用比例(0-1)
# 示例: 0.1, 0.5, 1.0
# 提示:
#   - 1.0 表示使用全部数据
#   - 0.1 表示使用 10% 数据
#   - 调试时可设为小值快速验证
fraction: 1.0

# 冻结层(None / int / list)
# 示例: null, 10, [0, 1, 2, 3]
# 提示:
#   - None: 不冻结任何层
#   - int N: 冻结前 N 层(常用 10 表示冻结 backbone)
#   - list: 冻结指定层索引
#   - 迁移学习场景使用
freeze: null

#------------------------------------------------------------------------------
# 优化器配置
#------------------------------------------------------------------------------

# 优化器(auto / SGD / Adam / AdamW)
# 示例: auto, SGD, Adam, AdamW, NAdam, RAdam
# 提示:
#   - auto: 自动选择(推荐)
#   - SGD: 传统随机梯度下降
#   - Adam / AdamW: 自适应学习率
#   - 小数据集推荐 AdamW
optimizer: auto

# 初始学习率
# 示例: 0.001, 0.01, 0.1
# 提示:
#   - SGD 推荐: 0.01
#   - Adam / AdamW 推荐: 0.001
#   - 大 batch 可适当增大
#   - 小 batch 需适当减小
lr0: 0.01

# 最终学习率比例(final_lr = lr0 × lrf)
# 示例: 0.01, 0.1, 0.2
# 提示:
#   - ★ 最终学习率 = lr0 × lrf
#   - 0.01 表示衰减到初始的 1%
#   - 配合余弦退火 cos_lr=true 使用
#   - 一般保持默认值即可
lrf: 0.01

# 动量参数
# 示例: 0.9, 0.937, 0.95
# 提示:
#   - SGD 动量参数 / Adam 的 beta1
#   - 一般保持默认值
#   - 增大可提高稳定性
momentum: 0.937

# 权重衰减(L2 正则)
# 示例: 0.0, 0.0001, 0.0005, 0.001
# 提示:
#   - 防止过拟合
#   - 小数据集可增大(0.001)
#   - 大数据集可减小(0.0001)
#   - 0 表示不使用正则化
weight_decay: 0.0005

# 是否使用余弦学习率调度
# 示例: false, true
# 提示:
#   - True: 余弦退火
#   - False: 线性退火
#   - 长训练周期推荐开启
cos_lr: false

#------------------------------------------------------------------------------
# 学习率预热
#------------------------------------------------------------------------------

# 学习率预热轮数
# 示例: 0.0, 1.0, 3.0, 5.0
# 提示:
#   - 前 N 轮逐渐增加学习率, 避免初期震荡
#   - 3-5 轮通常足够
#   - 0 表示禁用预热
warmup_epochs: 3.0

# 预热阶段初始动量
# 示例: 0.5, 0.8, 0.9
# 提示:
#   - 预热阶段的初始动量, 逐渐增加到 momentum
#   - 一般保持默认值
warmup_momentum: 0.8

# 预热阶段 bias 学习率
# 示例: 0.0, 0.1, 0.2
# 提示:
#   - 预热阶段 bias 层的学习率
#   - 通常设为 lr0 的 10 倍
#   - 一般保持默认值
warmup_bias_lr: 0.1

#------------------------------------------------------------------------------
# 损失权重
#------------------------------------------------------------------------------

# Box Loss 权重
# 示例: 5.0, 7.5, 10.0
# 提示:
#   - 边界框回归损失权重
#   - 定位不准时可增大
box: 7.5

# Cls Loss 权重
# 示例: 0.3, 0.5, 1.0
# 提示:
#   - 分类损失权重
#   - 类别混淆严重时可增大
cls: 0.5

# DFL Loss 权重
# 示例: 1.0, 1.5, 2.0
# 提示:
#   - Distribution Focal Loss 权重
#   - 改善边界框质量
dfl: 1.5

# Pose Loss 权重(仅姿态任务)
# 示例: 10.0, 12.0, 15.0
# 提示:
#   - 仅姿态估计任务
#   - 检测任务时不生效
pose: 12.0

# Keypoint Obj Loss 权重
# 示例: 1.0, 2.0, 3.0
# 提示:
#   - 仅姿态估计任务
#   - 关键点置信度损失
kobj: 2.0

# 标称批次大小(损失归一化)
# 示例: 16, 32, 64
# 提示:
#   - 用于损失归一化
#   - 与实际 batch 可以不同
#   - 一般保持默认值 64
nbs: 64

#------------------------------------------------------------------------------
# 数据增强-颜色
#------------------------------------------------------------------------------

# 色调扰动(0-1)
# 示例: 0.0, 0.015, 0.05
# 提示:
#   - HSV 色调扰动幅度
#   - 0 表示禁用
#   - 光照变化大时可增大
hsv_h: 0.015

# 饱和度扰动(0-1)
# 示例: 0.0, 0.5, 0.7
# 提示:
#   - HSV 饱和度扰动幅度
#   - 0.7 为中等增强
hsv_s: 0.7

# 亮度扰动(0-1)
# 示例: 0.0, 0.3, 0.4
# 提示:
#   - HSV 亮度扰动幅度
#   - 明暗变化大时可增大
hsv_v: 0.4

# BGR 通道翻转概率(0-1)
# 示例: 0.0, 0.1, 0.5
# 提示:
#   - RGB ↔ BGR 随机翻转
#   - 增强颜色鲁棒性
#   - 一般不需要开启
bgr: 0.0

#------------------------------------------------------------------------------
# 数据增强-几何
#------------------------------------------------------------------------------

# 随机旋转角度(0-180)
# 示例: 0.0, 10.0, 30.0
# 提示:
#   - 随机旋转最大角度
#   - 物体方向多样时可增大
#   - 建议 10-30 度
degrees: 0.0

# 随机平移比例(0-1)
# 示例: 0.0, 0.1, 0.2
# 提示:
#   - 图像平移的最大比例
#   - 0.1 表示最多平移 10%
translate: 0.1

# 随机缩放增益(0-1)
# 示例: 0.0, 0.3, 0.5
# 提示:
#   - 图像缩放增益范围
#   - 0.5 表示 0.5-1.5 倍缩放
scale: 0.5

# 随机错切角度(-180到180)
# 示例: 0.0, 2.0, 5.0
# 提示:
#   - 图像错切变换角度
#   - 一般不需要太大
#   - 建议 0-5 度
shear: 0.0

# 透视变换幅度(0-0.001)
# 示例: 0.0, 0.0001, 0.0005
# 提示:
#   - 透视变换幅度
#   - 0 表示禁用
#   - 一般保持较小值
perspective: 0.0

# 上下翻转概率(0-1)
# 示例: 0.0, 0.5
# 提示:
#   - 物体上下对称时可开启
#   - 大多数情况保持 0
flipud: 0.0

# 左右翻转概率(0-1)
# 示例: 0.0, 0.5, 1.0
# 提示:
#   - 物体左右对称时推荐开启
#   - 常用的数据增强手段
fliplr: 0.5

#------------------------------------------------------------------------------
# 数据增强-拼接
#------------------------------------------------------------------------------

# Mosaic 增强概率(0-1)
# 示例: 0.0, 0.5, 1.0
# 提示:
#   - 4 张图拼成一张
#   - 1.0 表示总是使用
#   - 增强小目标检测
#   - 训练后期自动关闭(close_mosaic)
mosaic: 1.0

# MixUp 增强概率(0-1)
# 示例: 0.0, 0.1, 0.15
# 提示:
#   - 两张图混合
#   - 0.1-0.15 为合理范围
#   - 可提升泛化能力
mixup: 0.0

# Copy-Paste 概率(仅分割, 0-1)
# 示例: 0.0, 0.1, 0.5
# 提示:
#   - 仅实例分割任务使用
#   - 复制粘贴实例到其他图像
copy_paste: 0.0

#------------------------------------------------------------------------------
# 验证和输出
#------------------------------------------------------------------------------

# 是否在训练期间验证
# 示例: true, false
# 提示:
#   - True: 每轮后在验证集上评估
#   - False: 不验证(快速调试用)
#   - 正式训练必须开启
val: true

# 是否生成训练可视化图
# 示例: false, true
# 提示:
#   - 生成损失曲线、mAP 曲线等
#   - 保存在输出目录
plots: true

# 检查点保存周期(-1=禁用)
# 示例: -1, 10, 20, 50
# 提示:
#   - -1: 只保存 last.pt 和 best.pt
#   - > 0: 每 N 轮保存一次检查点
#   - 长时间训练推荐开启
save_period: -1

#------------------------------------------------------------------------------
# 任务特定
#------------------------------------------------------------------------------

# 是否合并重叠 mask(仅分割)
# 示例: true, false
# 提示:
#   - 仅实例分割任务使用
#   - True: 合并重叠 mask
overlap_mask: true

# Mask 下采样率(仅分割)
# 示例: 2, 4, 8
# 提示:
#   - 仅实例分割任务使用
#   - mask 下采样倍数
mask_ratio: 4

# Dropout 比例(仅分类, 0-1)
# 示例: 0.0, 0.2, 0.5
# 提示:
#   - 仅分类任务使用
#   - 防止过拟合
dropout: 0.0

# Copy-Paste 模式(flip / mixup, 仅分割)
# 示例: flip, mixup
# 提示:
#   - 仅分割任务
#   - flip: 翻转模式
#   - mixup: 混合模式
copy_paste_mode: flip

# 自动增强策略(仅分类)
# 示例: randaugment, autoaugment, augmix
# 提示:
#   - 仅分类任务
auto_augment: randaugment

# 随机擦除概率(仅分类, 0-0.9)
# 示例: 0.0, 0.2, 0.4
# 提示:
#   - 仅分类任务
#   - 随机擦除图像区域
erasing: 0.4

#------------------------------------------------------------------------------
# 高级设置
#------------------------------------------------------------------------------

# 预训练权重(True / False / path)
# 示例: true, false, path/to/weights.pt
# 提示:
#   - True: 使用官方预训练权重
#   - False: 从头训练
#   - str: 自定义权重路径
#   - 小数据集强烈推荐使用预训练
pretrained: true

# 是否单类训练
# 示例: false, true
# 提示:
#   - True: 将多类数据集视为单类
#   - 特殊场景使用
single_cls: false

# 训练指定类别(None / [0,1,2])
# 示例: null, [0], [0, 1, 2]
# 提示:
#   - None: 训练所有类别
#   - list: 只训练指定类别 ID
classes: null

# 是否编译模型(PyTorch 2.0+)
# 示例: false, true, default
# 提示:
#   - PyTorch 2.0+ 支持
#   - 首次编译会较慢
compile: false

# 是否进行速度分析
# 示例: false, true
# 提示:
#   - ONNX / TensorRT 速度分析
#   - 训练时一般不需要
profile: false

# 自定义增强(高级用户)
# 示例: null
# 提示:
#   - None: 使用默认增强
#   - list: 自定义 Albumentations 变换
augmentations: null
