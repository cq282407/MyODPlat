#==============================================================================
# YOLO 验证配置
# 自动生成时间: 2026-07-06 15:53:33
# 编辑后保存; 重新生成(--overwrite)会覆盖并备份原文件.
#==============================================================================

#------------------------------------------------------------------------------
# 核心参数
#------------------------------------------------------------------------------

# 模型文件路径(.pt 或 .yaml)
# 示例: yolo11n.pt, yolo11s.pt, path/to/custom.pt
# 提示:
#   - 支持 .pt 权重文件或 .yaml 配置文件
#   - 官方模型: yolo11n/s/m/l/x.pt (n 最快, x 最准)
#   - 训练时如未指定, 默认从头训练
model: null

# 数据集配置文件(D3 odp-transform 产出的那份 yaml)
# 示例: data.yaml, rsod.yaml, configs/datasets/safety.yaml
# 提示:
#   - YAML 文件定义数据集路径和类别信息
#   - 必须包含: path, train, val, names
#   - 如果只给数据集名(如 'rsod'), 框架会通过 paths.dataset_yaml_path() 解析
data: null

# 任务类型(只能是 detect / segment)
# 示例: detect, segment
# 提示:
#   - 限定取值: detect / segment
#   - 决定输出目录的一级子目录
#   - val 模式下不传给 ultralytics(从权重自动推断)
task: detect

# 实验名(目录组织, None=自动生成)
# 示例: val_baseline, val_helmet_v1, null
# 提示:
#   - None: 由 ultralytics 自动生成 val / val2 / val3...
#   - 自定义: 用作 runs/<task>/<experiment_name>/ 子目录
experiment_name: null

#------------------------------------------------------------------------------
# 输入配置
#------------------------------------------------------------------------------

# 批次大小(int=固定值, -1=自动, 0-1=显存利用率)
# 示例: 8, 16, 32, -1, 0.7
# 提示:
#   - int: 固定批次大小(如 16)
#   - -1: 自动批次(使用约 60% 显存)
#   - 0.0-1.0: 显存利用率(如 0.7 = 70% 显存)
#   - 显存不足时建议: 8GB → 8-16, 16GB → 32-64
batch: 16

# 输入图像尺寸(像素)
# 示例: 320, 480, 640, 800, 1280
# 提示:
#   - 推荐使用 32 的倍数(640, 672, 704...)
#   - 更大尺寸 = 更高精度 + 更多显存 + 更慢速度
#   - 工业检测推荐: 640-800
#   - 小目标检测推荐: 1280+
imgsz: 640

# 数据加载线程数
# 示例: 0, 4, 8, 16
# 提示:
#   - 多线程加速数据加载
#   - 推荐: CPU 核心数的 1-2 倍
#   - Windows 可能需要设为 0
#   - 过高会导致内存占用过多
workers: 8

# 数据缓存(False/True/ram/disk)
# 示例: false, true, ram, disk
# 提示:
#   - False: 不缓存(默认)
#   - True/'ram': 缓存到内存(快但占内存)
#   - 'disk': 缓存到磁盘(节省内存但慢)
#   - 小数据集推荐 ram, 大数据集推荐 disk
cache: false

# 是否启用矩形训练
# 示例: false, true
# 提示:
#   - True: 减少填充, 提升训练速度
#   - 推理时自动启用
#   - 可能轻微影响精度
rect: false

#------------------------------------------------------------------------------
# 设备配置
#------------------------------------------------------------------------------

# 设备选择(0/cpu/mps/[0,1]/0,1)
# 示例: 0, 0, cpu, mps, [0, 1], 0,1
# 提示:
#   - None: 自动选择(优先 GPU)
#   - int: GPU 编号(0, 1, 2...)
#   - 'cpu': 使用 CPU
#   - 'mps': Mac M1/M2 GPU
#   - [0,1] 或 '0,1': 多 GPU 训练
#   - -1: 选择最空闲的 GPU
device: null

# 是否启用 AMP(推荐开启)
# 示例: true, false
# 提示:
#   - True: 使用 FP16 混合精度(快 + 省显存)
#   - False: 使用 FP32 全精度
#   - 现代 GPU (20 系+) 强烈推荐开启
#   - CPU 训练时自动禁用
amp: true

#------------------------------------------------------------------------------
# 输出配置
#------------------------------------------------------------------------------

# 项目输出目录(None=框架自动)
# 示例: runs/detect, experiments/safety
# 提示:
#   - 训练输出的根目录
#   - 默认: 由 service 层根据 task 自动拼装(runs/<task>/)
project: null

# 实验名称
# 示例: exp, safety_v1, baseline
# 提示:
#   - 每次运行的子目录名
#   - 默认: ultralytics 自动生成 exp, exp2, exp3...
name: null

# 是否覆盖已有实验目录
# 示例: false, true
# 提示:
#   - False: 自动创建新目录(exp2, exp3...)
#   - True: 覆盖已有目录
#   - 生产环境建议 False
exist_ok: false

# 是否保存检查点
# 示例: true, false
# 提示:
#   - True: 保存 last.pt 和 best.pt
#   - False: 不保存检查点(节省磁盘)
save: true

#------------------------------------------------------------------------------
# 基础设置
#------------------------------------------------------------------------------

# 是否显示详细日志
# 示例: true, false
# 提示:
#   - True: 显示详细日志
#   - False: 只显示关键信息
verbose: true

# 随机种子(可复现性)
# 示例: 0, 42, 2026
# 提示:
#   - 控制随机性, 确保可复现
#   - 相同种子 = 相同结果
#   - 建议每个实验使用不同种子
seed: 0

# 是否强制确定性算法
# 示例: true, false
# 提示:
#   - True: 强制使用确定性算法(完全可复现)
#   - False: 允许非确定性算法(可能更快)
#   - 实验对比时必须设为 True
deterministic: true

#------------------------------------------------------------------------------
# 验证控制
#------------------------------------------------------------------------------

# 数据集划分(val / test / train)
# 示例: val, test, train
# 提示:
#   - val: 使用验证集(默认)
#   - test: 使用测试集
#   - train: 使用训练集(调试用)
#   - 对应 data.yaml 里的字段名
split: val

# 置信度阈值(验证 0.001; 推理 0.25+)
# 示例: 0.001, 0.25, 0.5
# 提示:
#   - ★ 验证时通常设 0.001 (捕获所有预测, 用于计算 mAP)
#   - 推理时建议 0.25-0.5 (过滤低置信度)
#   - 不影响最终模型, 仅影响评估指标
conf: 0.001

# NMS IoU 阈值
# 示例: 0.5, 0.6, 0.7
# 提示:
#   - NMS(非极大值抑制) IoU 阈值
#   - COCO 标准: 0.6
#   - 密集目标场景可提高到 0.7
iou: 0.6

# 每张图最大检测数
# 示例: 100, 300, 1000
# 提示:
#   - 每张图像最多保留的检测框数量
#   - COCO 默认: 300
#   - 密集目标场景可增加
max_det: 300

#------------------------------------------------------------------------------
# 评估设置
#------------------------------------------------------------------------------

# 是否使用半精度推理
# 示例: true, false
# 提示:
#   - True: 使用 FP16 半精度(快 + 省显存)
#   - False: 使用 FP32 全精度
#   - 现代 GPU 推荐开启
#   - CPU 验证时自动禁用
half: true

# 是否生成评估图表
# 示例: true, false
# 提示:
#   - True: 生成混淆矩阵、PR 曲线等
#   - False: 不生成图表
#   - 批量验证时可关闭以加速
plots: true

# 是否保存 COCO JSON 格式结果
# 示例: false, true
# 提示:
#   - True: 保存 COCO 格式的预测结果
#   - False: 不保存 JSON
#   - 用于 COCO 官方评估工具
#   - 提交比赛时需要开启
save_json: true

# 是否保存混合标签
# 示例: false, true
# 提示:
#   - True: 保存混合标签(预测 + 真实)
#   - False: 不保存
#   - 调试和分析用
save_hybrid: false

#------------------------------------------------------------------------------
# 任务特定
#------------------------------------------------------------------------------

# 掩码下采样比例(仅分割)
# 示例: 1, 2, 4
# 提示:
#   - 仅实例分割任务
#   - 掩码相对原图的下采样倍数
mask_ratio: 4

# 是否允许掩码重叠(仅分割)
# 示例: true, false
# 提示:
#   - 仅实例分割任务
#   - True: 允许掩码重叠
overlap_mask: true

# 是否使用 OpenCV DNN 后端
# 示例: false, true
# 提示:
#   - True: 使用 OpenCV DNN 后端
#   - False: 使用 PyTorch(默认)
#   - DNN 适合边缘设备部署
dnn: false
