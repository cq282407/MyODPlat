#==============================================================================
# YOLO 推理配置
# 自动生成时间: 2026-07-07 11:19:02
# 编辑后保存；重新生成(--overwrite)会覆盖并备份原文件。
#==============================================================================

#------------------------------------------------------------------------------
# 核心参数
#------------------------------------------------------------------------------

# 模型文件路径(.pt 或 .yaml)
# 示例: yolo11n.pt, yolo11s.pt, path/to/custom.pt
# 提示:
#   - 支持 .pt 权重文件或 .yaml 配置文件
#   - 官方模型: yolo11n/s/m/l/x.pt (n 最快, x 最准)
#   - 训练时如未指定, 默认从头训练
model: null

# 数据集配置文件(D3 odp-transform 产出的那份 yaml)
# 示例: data.yaml, rsod.yaml, configs/datasets/safety.yaml
# 提示:
#   - YAML 文件定义数据集路径和类别信息
#   - 必须包含: path, train, val, names
#   - 如果只给数据集名(如 'rsod'), 框架会通过 paths.dataset_yaml_path() 解析
data: null

# 任务类型(只能是 detect / segment)
# 示例: detect, segment
# 提示:
#   - 限定取值: detect / segment
#   - 推理时从模型权重自动推断, 此处仅用于日志和目录组织
#   - 想给实验起名? → 用 experiment_name 字段
task: detect

# 实验名(None=自动生成)
# 示例: helmet_demo, video_test, rtsp_stream_v1, null
# 提示:
#   - None: 由 ultralytics 自动生成 predict, predict2, ...
#   - 自定义: 用作 runs/<task>/<experiment_name>/ 子目录
experiment_name: null

# 推理输入源(图/视频/目录/URL/摄像头/流)
# 示例: image.jpg, video.mp4, path/to/images/, "rtsp://example.com/live.sdp", 0, "https://example.com/img.jpg"
# 提示:
#   - 支持: 图像 / 视频 / 目录 / URL / 摄像头索引 / RTSP 流
#   - 目录: 自动遍历所有图像文件
#   - 0 / '0' / 1: 摄像头编号
#   - None: 必须通过 CLI 传 --source (运行时)
source: null

#------------------------------------------------------------------------------
# 输入配置
#------------------------------------------------------------------------------

# 批次大小(int=固定值, -1=自动, 0-1=显存利用率)
# 示例: 8, 16, 32, -1, 0.7
# 提示:
#   - int: 固定批次大小(如 16)
#   - -1: 自动批次(使用约 60% 显存)
#   - 0.0-1.0: 显存利用率(如 0.7 = 70% 显存)
#   - 显存不足时建议: 8GB → 8-16, 16GB → 32-64
batch: 16

# 输入图像尺寸(像素)
# 示例: 320, 480, 640, 800, 1280
# 提示:
#   - 推荐使用 32 的倍数(640, 672, 704...)
#   - 更大尺寸 = 更高精度 + 更多显存 + 更慢速度
#   - 工业检测推荐: 640-800
#   - 小目标检测推荐: 1280+
imgsz: 640

# 数据加载线程数
# 示例: 0, 4, 8, 16
# 提示:
#   - 多线程加速数据加载
#   - 推荐: CPU 核心数的 1-2 倍
#   - Windows 可能需要设为 0
#   - 过高会导致内存占用过多
workers: 8

# 数据缓存(False/True/ram/disk)
# 示例: false, true, ram, disk
# 提示:
#   - False: 不缓存(默认)
#   - True/'ram': 缓存到内存(快但占内存)
#   - 'disk': 缓存到磁盘(节省内存但慢)
#   - 小数据集推荐 ram, 大数据集推荐 disk
cache: false

# 是否启用矩形训练
# 示例: false, true
# 提示:
#   - True: 减少填充, 提升训练速度
#   - 推理时自动启用
#   - 可能轻微影响精度
rect: false

#------------------------------------------------------------------------------
# 设备配置
#------------------------------------------------------------------------------

# 设备选择(0/cpu/mps/[0,1]/0,1)
# 示例: 0, 0, cpu, mps, [0, 1], 0,1
# 提示:
#   - None: 自动选择(优先 GPU)
#   - int: GPU 编号(0, 1, 2...)
#   - 'cpu': 使用 CPU
#   - 'mps': Mac M1/M2 GPU
#   - [0,1] 或 '0,1': 多 GPU 训练
#   - -1: 选择最空闲的 GPU
device: null

# 是否启用 AMP(推荐开启)
# 示例: true, false
# 提示:
#   - True: 使用 FP16 混合精度(快 + 省显存)
#   - False: 使用 FP32 全精度
#   - 现代 GPU (20 系+) 强烈推荐开启
#   - CPU 训练时自动禁用
amp: true

#------------------------------------------------------------------------------
# 输出配置
#------------------------------------------------------------------------------

# 项目输出目录(None=框架自动)
# 示例: runs/detect, experiments/safety
# 提示:
#   - 训练输出的根目录
#   - 默认: 由 service 层根据 task 自动拼装(runs/<task>/)
project: null

# 实验名称
# 示例: exp, safety_v1, baseline
# 提示:
#   - 每次运行的子目录名
#   - 默认: ultralytics 自动生成 exp, exp2, exp3...
name: null

# 是否覆盖已有实验目录
# 示例: false, true
# 提示:
#   - False: 自动创建新目录(exp2, exp3...)
#   - True: 覆盖已有目录
#   - 生产环境建议 False
exist_ok: false

# 是否保存检查点
# 示例: true, false
# 提示:
#   - True: 保存 last.pt 和 best.pt
#   - False: 不保存检查点(节省磁盘)
save: true

#------------------------------------------------------------------------------
# 基础设置
#------------------------------------------------------------------------------

# 是否显示详细日志
# 示例: true, false
# 提示:
#   - True: 显示详细日志
#   - False: 只显示关键信息
verbose: true

# 随机种子(可复现性)
# 示例: 0, 42, 2026
# 提示:
#   - 控制随机性, 确保可复现
#   - 相同种子 = 相同结果
#   - 建议每个实验使用不同种子
seed: 0

# 是否强制确定性算法
# 示例: true, false
# 提示:
#   - True: 强制使用确定性算法(完全可复现)
#   - False: 允许非确定性算法(可能更快)
#   - 实验对比时必须设为 True
deterministic: true

#------------------------------------------------------------------------------
# 推理控制
#------------------------------------------------------------------------------

# 置信度阈值(推理 0.25+, 验证 0.001)
# 示例: 0.1, 0.25, 0.5, 0.7
# 提示:
#   - ★ 推理时 0.25-0.5 (过滤低置信度, 给用户看的)
#   - 验证时是 0.001 (捕获所有预测, 算 mAP 用)
#   - 工业部署常用 0.5+
#   - 调高 = 漏检多但误检少
conf: 0.25

# NMS IoU 阈值
# 示例: 0.5, 0.7, 0.45
# 提示:
#   - NMS 时重叠框去重的 IoU 阈值
#   - 调高 = 保留更多重叠框
#   - 调低 = 抑制更激进
#   - 工业 0.5-0.7 较常用
iou: 0.7

# 单图最大检测数
# 示例: 100, 300, 1000
# 提示:
#   - 单张图最多保留多少个检测框
#   - 密集场景 (人群计数) 调大到 1000+
#   - 稀疏场景 50-100 即可
max_det: 300

# 只检测的类别 ID 列表(None=全部)
# 示例: null, [0], [0, 1, 2]
# 提示:
#   - None: 检测所有类别
#   - list[int]: 只保留指定类别 ID 的检测结果
#   - 类别 ID 由 data.yaml 的 names 决定
classes: null

# 是否类别无关 NMS
# 示例: false, true
# 提示:
#   - True: 不同类别之间也做 NMS
#   - False: 同类内 NMS, 不同类保留
#   - 类别相互排斥时 (一个目标只属于一类) 开 True
agnostic_nms: false

# 是否启用 TTA 测试时增强
# 示例: false, true
# 提示:
#   - True: 多尺度+翻转推理后融合, 精度↑速度↓
#   - False: 单次推理
#   - 对比赛/打榜场景适用, 工业部署一般 False
augment: false

#------------------------------------------------------------------------------
# 视频流
#------------------------------------------------------------------------------

# 视频抽帧间隔(每 N 帧推理一次)
# 示例: 1, 2, 5
# 提示:
#   - 每 N 帧推理一次
#   - 1: 处理每一帧(默认)
#   - 5: 每 5 帧推理一次(加速)
#   - 仅对视频/流有效, 图像无视此参数
vid_stride: 1

# 是否流式推理(长视频/实时流必须 True)
# 示例: false, true
# 提示:
#   - True: 返回 generator (适合长视频/流, 内存友好)
#   - False: 返回 list (一次性出结果, 适合短视频/单图)
#   - 实时摄像头 / RTSP 必须 True
stream: false

# 是否缓存所有帧(防丢帧但延迟↑)
# 示例: false, true
# 提示:
#   - True: 缓存所有帧, 慢但不丢
#   - False: 实时丢弃旧帧, 快但可能漏
#   - 实时性要求高 → False; 离线分析 → True
stream_buffer: false

#------------------------------------------------------------------------------
# 输出控制
#------------------------------------------------------------------------------

# 是否保存预测结果为 txt
# 示例: false, true
# 提示:
#   - True: 输出 YOLO 格式 txt (每张图一份)
#   - 用于后续半自动标注 / 二次审查
save_txt: false

# txt 中是否包含 conf
# 示例: false, true
# 提示:
#   - True: txt 行追加置信度 (cls x y w h conf)
#   - False: 标准 YOLO 格式 (cls x y w h)
#   - 需要 save_txt=True 配套
save_conf: false

# 是否裁剪检测框另存
# 示例: false, true
# 提示:
#   - True: 把每个检测框抠出来单独存图
#   - 用于人脸库 / 物体库构建
save_crop: false

# 是否保存视频每一帧(仅 source 为视频时)
# 示例: false, true
# 提示:
#   - True: 视频推理时, 每一帧另存为图像
#   - False: 只输出标注视频
#   - 调试 / 抽样审查用
save_frames: false

# 是否弹窗显示(服务器环境必须 False)
# 示例: false, true
# 提示:
#   - True: 弹窗实时显示 (需要 GUI)
#   - 服务器/Docker 环境必须 False
#   - 调试时用, 生产环境关
show: false

# 可视化是否带类别标签
# 示例: true, false
# 提示:
#   - True: 检测框上方写类别名
#   - False: 只画框, 适合给非技术人员看
show_labels: true

# 可视化是否带置信度
# 示例: true, false
# 提示:
#   - True: 类别名后追加 (0.87)
#   - False: 只显示类别名
show_conf: true

# 可视化是否画框
# 示例: true, false
# 提示:
#   - True: 画矩形框 + 标签
#   - False: 只画标签, 不画框 (segment 任务有时用)
show_boxes: true

# 可视化线宽(像素, None=自动)
# 示例: null, 2, 3, 5
# 提示:
#   - None: 自动 (根据图像大小)
#   - int: 固定像素宽度
#   - 大图建议 3-5, 小图 1-2
line_width: null

#------------------------------------------------------------------------------
# 任务特定
#------------------------------------------------------------------------------

# 分割任务: 是否输出原图分辨率 mask
# 示例: false, true
# 提示:
#   - 仅 segment 任务: True 输出原图分辨率 mask
#   - False: 输出推理分辨率 mask (节省内存)
#   - detect 任务忽略此字段
retina_masks: false

# 是否保存特征图(调试用)
# 示例: false, true
# 提示:
#   - True: 保存模型各层的特征图
#   - 调试 / 论文用
#   - 会占大量磁盘, 生产环境关
visualize: false

# 提取指定层 embedding(None=不提取)
# 示例: null, [10], [10, 20]
# 提示:
#   - None: 不提取
#   - list[int]: 提取指定层索引的特征向量
#   - 用于相似度检索 / 特征聚类
embed: null
